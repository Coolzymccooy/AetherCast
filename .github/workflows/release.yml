name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the auto-updater.
          # Generate once with: npx tauri signer generate -w ~/.tauri/aethercast.key
          # Then add TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          # as repository secrets in GitHub → Settings → Secrets and variables → Actions.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AetherCast ${{ github.ref_name }}"
          releaseBody: |
            ## AetherCast ${{ github.ref_name }}

            Professional broadcast studio for live streaming.

            ### Downloads
            - **Windows**: `.msi` or `-setup.exe` installer

            ### Features
            - GPU-accelerated streaming (NVENC/QSV/AMF)
            - Multi-destination output (RTMP/RTMPS/SRT/RIST)
            - Real-time compositor with scene switching
            - Pro audio processing (compressor, EQ, limiter, LUFS metering)
            - AI-powered scene direction
            - Lumina Presenter integration (remote go-live control)
            - Instant replay buffer
            - MIDI/Stream Deck support
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload stable latest asset aliases
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $targetBundleRoot = Join-Path $PWD "src-tauri\target\${{ matrix.target }}\release\bundle"
          $bundleRoot = if (Test-Path $targetBundleRoot) { $targetBundleRoot } else { Join-Path $PWD "src-tauri\target\release\bundle" }

          $exe = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*-setup.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $msi = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*.msi" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if ($null -eq $exe -or $null -eq $msi) {
            throw "Could not locate Windows release bundles under $bundleRoot"
          }

          $aliasDir = Join-Path $PWD ".release-aliases"
          New-Item -ItemType Directory -Force -Path $aliasDir | Out-Null

          $exeAlias = Join-Path $aliasDir "Selton.Studio_latest_x64-setup.exe"
          $msiAlias = Join-Path $aliasDir "Selton.Studio_latest_x64_en-US.msi"

          Copy-Item $exe.FullName $exeAlias -Force
          Copy-Item $msi.FullName $msiAlias -Force

          gh release upload "${{ github.ref_name }}" $exeAlias $msiAlias --clobber

      - name: Generate and upload latest.json update manifest
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the signed .nsis.zip and .nsis.zip.sig produced by tauri-action
          $targetBundleRoot = Join-Path $PWD "src-tauri\target\${{ matrix.target }}\release\bundle"
          $bundleRoot = if (Test-Path $targetBundleRoot) { $targetBundleRoot } else { Join-Path $PWD "src-tauri\target\release\bundle" }

          $nsisZip = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*.nsis.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*.nsis.zip.sig" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if ($null -eq $nsisZip -or $null -eq $nsisSig) {
            Write-Warning "Signed NSIS bundle not found — skipping latest.json generation. Add TAURI_SIGNING_PRIVATE_KEY secret to enable auto-update."
            exit 0
          }

          $signature = Get-Content $nsisSig.FullName -Raw
          $version = "${{ github.ref_name }}".TrimStart("v")
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $downloadUrl = "https://github.com/Coolzymccooy/AetherCast/releases/download/${{ github.ref_name }}/$($nsisZip.Name)"

          $manifest = @{
            version = $version
            notes = "AetherCast ${{ github.ref_name }} — see release page for details."
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                url = $downloadUrl
                signature = $signature.Trim()
                with_elevated_task = $true
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifestPath = Join-Path $PWD "latest.json"
          $manifest | Set-Content $manifestPath -Encoding utf8

          gh release upload "${{ github.ref_name }}" $manifestPath --clobber

      - name: Mark release as latest
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --latest
