name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Create GitHub Release and upload all assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bundleRoot = Join-Path $PWD "src-tauri\target\${{ matrix.target }}\release\bundle"

          Write-Host "Bundle contents:"
          Get-ChildItem -Path $bundleRoot -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }

          # Locate the main installers
          $exe = Get-ChildItem -Path $bundleRoot -Recurse | Where-Object { $_.Name -like "*-setup.exe" } | Select-Object -First 1
          $msi = Get-ChildItem -Path $bundleRoot -Recurse | Where-Object { $_.Extension -eq ".msi" -and $_.Name -notlike "*.msi.zip" } | Select-Object -First 1

          # Locate the update bundles (for auto-updater)
          $nsisZip  = Get-ChildItem -Path $bundleRoot -Recurse | Where-Object { $_.Name -like "*.nsis.zip" -and $_.Name -notlike "*.nsis.zip.sig" } | Select-Object -First 1
          $nsisSig  = Get-ChildItem -Path $bundleRoot -Recurse | Where-Object { $_.Name -like "*.nsis.zip.sig" } | Select-Object -First 1

          if ($null -eq $exe -or $null -eq $msi) {
            throw "Could not locate Windows installers under $bundleRoot"
          }

          # Create stable-name aliases
          $aliasDir = Join-Path $PWD ".release-aliases"
          New-Item -ItemType Directory -Force -Path $aliasDir | Out-Null
          $exeAlias = Join-Path $aliasDir "Selton.Studio_latest_x64-setup.exe"
          $msiAlias = Join-Path $aliasDir "Selton.Studio_latest_x64_en-US.msi"
          Copy-Item $exe.FullName $exeAlias -Force
          Copy-Item $msi.FullName $msiAlias -Force

          # Create the GitHub release
          $releaseBody = @"
          ## AetherCast $tag

          Professional broadcast studio for live streaming.

          ### Downloads
          - **Windows**: ``.msi`` or ``-setup.exe`` installer

          ### Features
          - GPU-accelerated streaming (NVENC/QSV/AMF)
          - Multi-destination output (RTMP/RTMPS/SRT/RIST)
          - Real-time compositor with scene switching
          - Pro audio processing (compressor, EQ, limiter, LUFS metering)
          - AI-powered scene direction
          - Lumina Presenter integration (remote go-live control)
          - Instant replay buffer
          - MIDI/Stream Deck support
          "@

          gh release create $tag `
            --title "AetherCast $tag" `
            --notes $releaseBody `
            --latest `
            $exe.FullName `
            $msi.FullName `
            $exeAlias `
            $msiAlias

          # Upload update bundles if present (needed for latest.json auto-updater)
          if ($null -ne $nsisZip -and $null -ne $nsisSig) {
            Write-Host "Uploading update bundles: $($nsisZip.Name)"
            gh release upload $tag $nsisZip.FullName $nsisSig.FullName --clobber
          } else {
            Write-Warning "No .nsis.zip found — auto-updater will not work for this release"
          }

      - name: Generate and upload latest.json update manifest
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bundleRoot = Join-Path $PWD "src-tauri\target\${{ matrix.target }}\release\bundle"

          $nsisZip = Get-ChildItem -Path $bundleRoot -Recurse | Where-Object { $_.Name -like "*.nsis.zip" -and $_.Name -notlike "*.nsis.zip.sig" } | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleRoot -Recurse | Where-Object { $_.Name -like "*.nsis.zip.sig" } | Select-Object -First 1

          if ($null -eq $nsisZip -or $null -eq $nsisSig) {
            Write-Warning "Signed NSIS bundle not found — skipping latest.json generation"
            exit 0
          }

          $signature = (Get-Content $nsisSig.FullName -Raw).Trim()
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $downloadUrl = "https://github.com/Coolzymccooy/AetherCast/releases/download/$tag/$($nsisZip.Name)"

          $manifest = @{
            version = $version
            notes = "AetherCast $tag — see release page for details."
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                url = $downloadUrl
                signature = $signature
                with_elevated_task = $true
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifestPath = Join-Path $PWD "latest.json"
          $manifest | Set-Content $manifestPath -Encoding utf8

          Write-Host "Uploading latest.json pointing to $downloadUrl"
          gh release upload $tag $manifestPath --clobber
